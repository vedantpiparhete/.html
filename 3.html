<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminary Scholarship Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f1ea;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid #8b7355; /* Classic Theological Gold/Brown */
        }

        h2 {
            text-align: center;
            color: #5d4037;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            text-align: center;
            font-size: 0.9em;
            color: #777;
            margin-bottom: 30px;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        legend {
            font-weight: bold;
            padding: 0 10px;
            color: #8b7355;
            font-size: 1.1em;
        }

        .field-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #8b7355;
        }

        .radio-check-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        .inline-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .inline-label input {
            margin-right: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #8b7355;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #5d4037;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Scholarship Application</h2>
    <p class="subtitle">Equipping the next generation of leaders.</p>

    <form action="#" method="post">
        
        <fieldset>
            <legend>Applicant Identity</legend>
            <div class="field-group">
                <label for="fname">Full Name</label>
                <input type="text" id="fname" name="fname" placeholder="full Name" required>
            </div>

            <div class="field-group">
                <label for="email">Ecclesiastical Email</label>
                <input type="email" id="email" name="email" placeholder="Email@gmail.com.edu" required>
            </div>

            <label>Gender Identification</label>
            <div class="radio-check-group">
                <label class="inline-label"><input type="radio" name="gender" value="male"> Male</label>
                <label class="inline-label"><input type="radio" name="gender" value="female"> Female</label>
                <label class="inline-label"><input type="radio" name="gender" value="other"> Other</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Academic Intentions</legend>
            
            <div class="field-group">
                <label for="program">Degree Program</label>
                <select id="program" name="program">
                    <option value="" disabled selected>Select your path...</option>
                    <option value="mdiv">Master of Engneering (M.Teck)</option>
                    <option value="math">MA in Theological Studies</option>
                    <option value="dmin">Doctor of Ministry (D.Min.)</option>
                    <option value="cert">Certificate in Biblical Leadership</option>
                </select>
            </div>

            <label>Financial Aid Interest</label>
            <div class="radio-check-group">
                <label class="inline-label"><input type="checkbox" name="aid" value="merit"> Academic Merit Scholarship</label>
                <label class="inline-label"><input type="checkbox" name="aid" value="mission"> Global Missions Grant</label>
                <label class="inline-label"><input type="checkbox" name="aid" value="need"> Need-Based Tuition Assistance</label>
            </div>
        </fieldset>

        <button type="submit">Submit Application</button>
    </form>
</div>

</body>
</html>
