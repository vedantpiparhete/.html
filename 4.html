<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Power Gallery</title>
    <!-- Link to the External CSS -->
    <link rel="stylesheet" href="4.css">
</head>
<body>

    <header>
        <h1>Legendary Anime Gallery</h1>
        <p>Hover over the heroes to reveal their power</p>
    </header>

    <div class="gallery-container">
        <!-- Card 1: Naruto -->
        <div class="anime-card" style="--bg: #ff9a00;">
            <img src="https://alphacoders.com" alt="Naruto">
            <div class="overlay">
                <h2 class="anime-name">Naruto Uzumaki</h2>
            </div>
        </div>

        <!-- Card 2: Luffy -->
        <div class="anime-card" style="--bg: #e63946;">
            <img src="https://alphacoders.com" alt="Luffy">
            <div class="overlay">
                <h2 class="anime-name">Monkey D. Luffy</h2>
            </div>
        </div>

        <!-- Card 3: Goku -->
        <div class="anime-card" style="--bg: #4361ee;">
            <img src="https://alphacoders.com" alt="Goku">
            <div class="overlay">
                <h2 class="anime-name">Son Goku</h2>
            </div>
        </div>

        <!-- Card 4: Tanjiro -->
        <div class="anime-card" style="--bg: #2a9d8f;">
            <img src="https://alphacoders.com" alt="Tanjiro">
            <div class="overlay">
                <h2 class="anime-name">Tanjiro Kamado</h2>
            </div>
        </div>
    </div>

</body>
</html>
